name: CI

# Cluster-independent, secret-free validation. Runs the same `just ci` contract
# that developers run locally. No kubeconfig, SOPS age key, or cluster access is
# used or required. The push trigger validates the exact merged commit Flux consumes
# (and catches emergency direct-to-main bypasses).

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  ci:
    name: ci
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Check out repository
        # Full history so the gitleaks scan in `just repo verify` covers all commits.
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          fetch-depth: 0

      - name: Install mise and repository tools
        # Installs the exact toolchain pinned in .mise.toml / mise.lock.
        uses: jdx/mise-action@dad1bfd3df957f44999b559dd69dc1671cb4e9ea # v4.2.1
        with:
          install: true
          cache: true

      - name: Run cluster-independent validation
        run: mise exec -- just ci
