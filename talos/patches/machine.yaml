---
machine:
  install:
    wipe: true
  features:
    kubePrism:
      enabled: true
      port: 7445
    hostDNS:
      enabled: true
      forwardKubeDNSToHost: true
  kubelet:
    extraMounts:
      # Longhorn's manager and CSI pods bind-mount their data directory, so the
      # /var/mnt/longhorn user volume must be exposed into the kubelet mount
      # namespace with shared (rshared) propagation. Required for Longhorn on Talos.
      - destination: /var/mnt/longhorn
        type: bind
        source: /var/mnt/longhorn
        options:
          - bind
          - rshared
          - rw
  nodeLabels:
    # All three nodes are schedulable control planes that also serve workloads
    # and MetalLB LoadBalancer traffic. Talos adds
    # node.kubernetes.io/exclude-from-external-load-balancers to control-plane
    # nodes and reconciles it from machine.nodeLabels; MetalLB honors that label
    # and refuses to announce, so with every node excluded there are "no
    # available nodes" and the internal Gateway IP is never announced. Delete the
    # label so all three nodes are eligible L2 announcers.
    # $$patch escapes talhelper's environment-variable substitution so it renders
    # a literal "$patch: delete" strategic-merge directive for Talos.
    node.kubernetes.io/exclude-from-external-load-balancers:
      $$patch: delete
cluster:
  proxy:
    disabled: true
