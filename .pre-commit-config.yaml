---
# Local fast-feedback hooks. The authoritative gate is `just ci` (also run in CI).
# Install with `just repo hooks`; run all with `just repo lint`.
repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
      - id: check-added-large-files
      - id: check-merge-conflict
      - id: check-case-conflict
      - id: end-of-file-fixer
      - id: trailing-whitespace
      - id: mixed-line-ending
      - id: check-yaml
        args: [--allow-multiple-documents]
      - id: check-json

  - repo: https://github.com/adrienverge/yamllint
    rev: v1.38.0
    hooks:
      - id: yamllint
        args: [--strict, --config-file, .yamllint]

  - repo: local
    hooks:
      # Scan the staged diff for secrets (uses the mise-pinned gitleaks).
      - id: gitleaks-staged
        name: gitleaks (staged changes)
        entry: bash -c 'git diff --cached --no-ext-diff --binary | gitleaks stdin --redact --no-banner'
        language: system
        pass_filenames: false

      # Refuse a plaintext *.sops.yaml (validates the staged blob, not the worktree).
      - id: sops-encrypted
        name: SOPS files are encrypted (staged)
        entry: scripts/check-sops-encrypted.sh
        language: script
        pass_filenames: false
        files: '\.sops\.ya?ml$'
