---
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: wildcard-lab-supermorphic-com
  namespace: networking
spec:
  dnsNames:
    - "*.lab.supermorphic.com"
  issuerRef:
    group: cert-manager.io
    kind: ClusterIssuer
    name: letsencrypt-production
  privateKey:
    algorithm: ECDSA
    rotationPolicy: Always
    size: 256
  secretName: wildcard-lab-supermorphic-com-tls
  usages:
    - digital signature
    - server auth
