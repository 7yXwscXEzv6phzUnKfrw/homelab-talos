---
apiVersion: v1
kind: Namespace
metadata:
  name: trivy-system
  labels:
    # The infra-assessment node-collector runs with host access; privileged keeps
    # PodSecurity from blocking its scan jobs.
    pod-security.kubernetes.io/audit: privileged
    pod-security.kubernetes.io/enforce: privileged
    pod-security.kubernetes.io/warn: privileged
