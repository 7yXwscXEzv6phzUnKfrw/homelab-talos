# Prowlarr (indexer manager) via the bjw-s app-template chart. Config-only: it manages
# indexers and pushes them to Sonarr/Radarr over their APIs (a manual first-run step),
# so it needs no shared /data. Single replica, Recreate on a Longhorn RWO config volume
# (single-writer SQLite). API key and app links persist in the config PVC.
controllers:
  prowlarr:
    type: deployment
    strategy: Recreate
    pod:
      securityContext:
        runAsUser: 568
        runAsGroup: 568
        fsGroup: 568
        fsGroupChangePolicy: OnRootMismatch
    containers:
      app:
        image:
          repository: ghcr.io/home-operations/prowlarr
          tag: 2.1.5.5216
        env:
          TZ: America/Denver
        resources:
          requests:
            cpu: 25m
            memory: 256Mi
          limits:
            memory: 1Gi
        securityContext:
          allowPrivilegeEscalation: false
          capabilities:
            drop: ["ALL"]
        probes:
          # /ping is unauthenticated and returns 200 — real health, unlike a TCP check.
          readiness:
            enabled: true
            custom: true
            spec:
              httpGet:
                path: /ping
                port: 9696
              periodSeconds: 10
              failureThreshold: 3
          liveness:
            enabled: true
            custom: true
            spec:
              httpGet:
                path: /ping
                port: 9696
              periodSeconds: 30
              failureThreshold: 5
          startup:
            enabled: true
            custom: true
            spec:
              httpGet:
                path: /ping
                port: 9696
              periodSeconds: 5
              failureThreshold: 30
service:
  app:
    controller: prowlarr
    ports:
      http:
        port: 9696
persistence:
  config:
    type: persistentVolumeClaim
    accessMode: ReadWriteOnce
    size: 5Gi
    storageClass: longhorn
    # Preserve indexer config across a teardown (Longhorn reclaim is Delete).
    annotations:
      helm.sh/resource-policy: keep
    globalMounts:
      - path: /config
