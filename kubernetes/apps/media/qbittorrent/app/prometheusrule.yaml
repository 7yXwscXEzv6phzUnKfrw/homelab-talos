---
# Reactive critical alert: fires when the ProtonVPN tunnel is down. Sourced from the
# Gatus health probe of Gluetun's control server (endpoint "qbittorrent-vpn" in group
# "Media"); Gatus exports gatus_results_endpoint_success (1=up, 0=down) and is scraped by
# Prometheus. When the tunnel drops, Gluetun's firewall kill-switches all qBittorrent
# egress (fail-closed) — this alert is what makes that visible instead of a silent stall.
# Prometheus discovers this rule cluster-wide (ruleSelectorNilUsesHelmValues: false).
apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: qbittorrent-vpn
  namespace: media
  labels:
    app.kubernetes.io/name: qbittorrent
spec:
  groups:
    - name: qbittorrent-vpn
      rules:
        - alert: QbittorrentVpnDown
          # Matched on name+group labels (robust to Gatus "key" slug formatting).
          expr: gatus_results_endpoint_success{name="qbittorrent-vpn", group="Media"} == 0
          for: 5m
          labels:
            severity: critical
          annotations:
            summary: qBittorrent ProtonVPN tunnel is down
            description: >-
              Gluetun reports the ProtonVPN tunnel is not running (Gatus health probe of
              the control server failing for >5m). qBittorrent egress is kill-switched
              (fail-closed) and downloads are paused. Check Gluetun logs and the ProtonVPN
              WireGuard credential (annual Extend / expiry — see docs/protonvpn-gluetun.md).
        - alert: QbittorrentVpnProbeMissing
          # The health probe metric disappeared entirely (Gatus down, endpoint removed,
          # or scrape broken) — the VPN alert above is blind until this clears.
          expr: absent(gatus_results_endpoint_success{name="qbittorrent-vpn", group="Media"})
          for: 15m
          labels:
            severity: warning
          annotations:
            summary: qBittorrent VPN health probe metric is missing
            description: >-
              gatus_results_endpoint_success for the qbittorrent-vpn probe is absent for
              >15m, so the QbittorrentVpnDown alert cannot fire. Check Gatus and the
              qbittorrent-gluetun-control Service.
