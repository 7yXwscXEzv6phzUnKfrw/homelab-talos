# Plex Media Server via the bjw-s app-template chart. Single replica (Plex is
# single-instance — no active-active), Recreate strategy on a Longhorn RWO config
# volume so a node failure reschedules cleanly instead of deadlocking on the PVC.
# Media is the shared RWX SMB PVC (media-data) mounted at /data; transcode scratch is
# a node-local emptyDir, never the NAS. Hardware transcode via Intel QuickSync: the
# gpu.intel.com/i915 request (below) makes the intel-gpu-plugin inject /dev/dri, and
# also targets Plex to a GPU-capable NUC (all three qualify).
controllers:
  plex:
    type: deployment
    strategy: Recreate
    pod:
      # Give Plex time to close its SQLite database cleanly on a planned drain.
      terminationGracePeriodSeconds: 120
      securityContext:
        runAsUser: 568
        runAsGroup: 568
        fsGroup: 568
        fsGroupChangePolicy: OnRootMismatch
    containers:
      app:
        image:
          repository: ghcr.io/home-operations/plex
          tag: 1.43.3.10828
        env:
          TZ: America/Denver
        resources:
          requests:
            cpu: 100m
            memory: 512Mi
            gpu.intel.com/i915: 1
          limits:
            memory: 4Gi
            # Intel QuickSync. The plugin injects /dev/dri owned by the runtime user
            # (568), so no supplementalGroups are needed. request==limit is required
            # for extended (device) resources.
            gpu.intel.com/i915: 1
        securityContext:
          allowPrivilegeEscalation: false
          capabilities:
            drop: ["ALL"]
        probes:
          # HTTP GET /identity (unauthenticated, returns 200) instead of the default
          # TCP check: a hung Plex accepts TCP on 32400 while its HTTP API is dead, so
          # TCP probes falsely report Ready. HTTP probes keep a broken Plex out of the
          # Service (readiness) and auto-restart it (liveness).
          liveness:
            enabled: true
            custom: true
            spec:
              httpGet:
                path: /identity
                port: 32400
              # Lenient so it never kills Plex mid-transcode: ~3 min of failures first.
              periodSeconds: 30
              timeoutSeconds: 10
              failureThreshold: 6
          readiness:
            enabled: true
            custom: true
            spec:
              httpGet:
                path: /identity
                port: 32400
              periodSeconds: 10
              timeoutSeconds: 5
              failureThreshold: 3
          startup:
            enabled: true
            custom: true
            spec:
              httpGet:
                path: /identity
                port: 32400
              # Plex can take a while to come up on first boot / big libraries (5 min).
              periodSeconds: 10
              timeoutSeconds: 5
              failureThreshold: 30
service:
  app:
    controller: plex
    type: ClusterIP
    ports:
      http:
        port: 32400
persistence:
  config:
    type: persistentVolumeClaim
    # ReadWriteOncePod: strongest single-writer isolation for the Plex SQLite DB
    # (only one pod cluster-wide may mount it RW). Falls back to ReadWriteOnce if a
    # hard node-down ever leaves the replacement pod stuck on the old pod's claim.
    accessMode: ReadWriteOncePod
    size: 30Gi
    storageClass: longhorn
    # Survive a full app teardown: helm.sh/resource-policy=keep stops a helm
    # uninstall / Flux prune from deleting this PVC (the longhorn StorageClass
    # reclaims Delete, so losing the PVC would lose the data). The Plex library DB
    # then persists across redeploys; the daily Longhorn backup to the UNAS covers
    # catastrophic loss.
    annotations:
      helm.sh/resource-policy: keep
    globalMounts:
      - path: /config
  transcode:
    type: emptyDir
    globalMounts:
      - path: /transcode
  media:
    type: persistentVolumeClaim
    existingClaim: media-data
    globalMounts:
      # Mounted at /Volumes/Prometheus (the SMB share root) to match the paths the
      # previous Mac-mini Plex used (/Volumes/Prometheus/media/{movies,tv}), so the
      # migrated library database resolves with zero re-matching. Plex-specific; the
      # later *arr apps mount this same share at /data.
      - path: /Volumes/Prometheus
