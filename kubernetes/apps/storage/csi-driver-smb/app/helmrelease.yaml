---
# yaml-language-server: $schema=https://k8s-schemas.home-operations.com/helm.toolkit.fluxcd.io/helmrelease_v2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: csi-driver-smb
  namespace: csi-driver-smb
spec:
  chart:
    spec:
      chart: csi-driver-smb
      interval: 15m
      sourceRef:
        kind: HelmRepository
        name: csi-driver-smb
      version: 1.20.3
  driftDetection:
    mode: enabled
  install:
    remediation:
      retries: 3
  interval: 1h
  releaseName: csi-driver-smb
  targetNamespace: csi-driver-smb
  timeout: 10m
  upgrade:
    cleanupOnFail: true
    remediation:
      retries: 3
      strategy: rollback
  valuesFrom:
    - kind: ConfigMap
      name: csi-driver-smb-values
      valuesKey: values.yaml
