---
apiVersion: v1
kind: Namespace
metadata:
  name: csi-driver-smb
  labels:
    # The node plugin mounts host paths and runs privileged, like other CSI/storage
    # components (longhorn-system, metallb).
    pod-security.kubernetes.io/audit: privileged
    pod-security.kubernetes.io/enforce: privileged
    pod-security.kubernetes.io/warn: privileged
