# Longhorn 1.12.0 values. Mirrors the proven homelab-gitops config plus the Talos
# data path and hard replica anti-affinity from the Phase 9 plan.
preUpgradeChecker:
  jobEnabled: false
defaultSettings:
  # Longhorn stores replicas on the dedicated Talos user volume, not the chart
  # default /var/lib/longhorn (which would land on EPHEMERAL).
  defaultDataPath: /var/mnt/longhorn
  # Hard node-level anti-affinity: a volume's replicas must land on different
  # nodes (two replicas across three nodes tolerates one node loss).
  replicaSoftAntiAffinity: false
  # Longhorn 1.7+ removed the backup-target / backup-target-credential-secret
  # settings; the backup target is now a BackupTarget CR (config/backup-target.yaml).
  snapshotDataIntegrity: enabled
  backupCompressionMethod: gzip
  # Auto-failover for single-replica RWO/RWOP workloads on a HARD node-down: when a
  # node is unreachable, Longhorn force-deletes its stuck pods so Kubernetes can
  # reschedule them onto a healthy node and re-attach the volume from a surviving
  # replica. Without this (default "do-nothing") a powered-off node leaves e.g. Plex
  # stuck Terminating and it never recreates. Verified via the Phase-11 node-down test.
  nodeDownPodDeletionPolicy: delete-both-statefulset-and-deployment-pod
metrics:
  # No Prometheus Operator until Phase 10; enable the ServiceMonitor then.
  serviceMonitor:
    enabled: false
persistence:
  defaultClass: true
  defaultClassReplicaCount: 2
