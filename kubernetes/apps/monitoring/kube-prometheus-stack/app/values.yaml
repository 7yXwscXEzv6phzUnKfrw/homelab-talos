# kube-prometheus-stack sized for the three-node Talos cluster (32 GB RAM/node,
# Longhorn block storage) — every Raspberry-Pi-5 constraint from the legacy repo
# is raised here. Talos does not expose kube-proxy (Cilium replaces it) or the
# controller-manager/scheduler/etcd metrics remotely, so those scrape targets and
# their alert rules are disabled to avoid false "down" alerts.
crds:
  enabled: true

kubeProxy:
  enabled: false
kubeControllerManager:
  enabled: false
kubeScheduler:
  enabled: false
kubeEtcd:
  enabled: false

defaultRules:
  create: true
  rules:
    etcd: false
    kubeControllerManager: false
    kubeScheduler: false
    kubeProxy: false

alertmanager:
  alertmanagerSpec:
    replicas: 1
    retention: 120h
    storage:
      volumeClaimTemplate:
        spec:
          storageClassName: longhorn
          accessModes: ["ReadWriteOnce"]
          resources:
            requests:
              storage: 5Gi
    resources:
      requests:
        cpu: 50m
        memory: 100Mi
      limits:
        memory: 256Mi

grafana:
  # KNOWN ISSUE (deferred): Grafana's PVC is ReadWriteOnce and this Deployment
  # uses RollingUpdate, which will deadlock on its next pod roll (README:
  # "ReadWriteOnce volumes require the Recreate deployment strategy"). The
  # deploymentStrategy.type=Recreate fix cannot be applied while KPS HelmRelease
  # upgrades wedge on a helm-controller in-cache-sync timeout; fix that upgrade
  # path first (see docs/phase-10-platform.md), then set Recreate.
  admin:
    existingSecret: grafana-admin-secret
    userKey: admin-user
    passwordKey: admin-password
  persistence:
    enabled: true
    type: pvc
    storageClassName: longhorn
    size: 10Gi
    accessModes: ["ReadWriteOnce"]
  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      memory: 512Mi
  grafana.ini:
    server:
      root_url: https://grafana.lab.supermorphic.com
      serve_from_sub_path: false

prometheus:
  prometheusSpec:
    replicas: 1
    retention: 30d
    retentionSize: 45GiB
    walCompression: true
    # Scrape every ServiceMonitor/PodMonitor/Rule in the cluster, not only the
    # chart-labeled ones (the Pi build restricted this to save memory).
    serviceMonitorSelectorNilUsesHelmValues: false
    podMonitorSelectorNilUsesHelmValues: false
    ruleSelectorNilUsesHelmValues: false
    probeSelectorNilUsesHelmValues: false
    scrapeConfigSelectorNilUsesHelmValues: false
    storageSpec:
      volumeClaimTemplate:
        spec:
          storageClassName: longhorn
          accessModes: ["ReadWriteOnce"]
          resources:
            requests:
              storage: 50Gi
    resources:
      requests:
        cpu: 500m
        memory: 2Gi
      limits:
        memory: 4Gi

prometheusOperator:
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      memory: 256Mi

kube-state-metrics:
  resources:
    requests:
      cpu: 50m
      memory: 128Mi
    limits:
      memory: 256Mi

prometheus-node-exporter:
  resources:
    requests:
      cpu: 50m
      memory: 64Mi
    limits:
      memory: 128Mi
