---
apiVersion: v1
kind: Namespace
metadata:
  name: monitoring
  labels:
    # node-exporter needs host mounts/network; privileged keeps PodSecurity happy.
    pod-security.kubernetes.io/audit: privileged
    pod-security.kubernetes.io/enforce: privileged
    pod-security.kubernetes.io/warn: privileged
    # Required for HTTPRoutes here to attach to the internal gateway (its https
    # listener allows routes only from namespaces carrying this label).
    gateway.supermorphic.com/access: internal
