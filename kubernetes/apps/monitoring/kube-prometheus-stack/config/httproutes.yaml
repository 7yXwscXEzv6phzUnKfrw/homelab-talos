---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: grafana
  namespace: monitoring
  annotations:
    external-dns.k8s.io/audience: internal
    # Homepage auto-discovery (kubernetes.yaml gateway: true). No widget: the
    # Grafana widget needs admin credentials, which must never be a cleartext
    # annotation — wire it via a secret-backed HOMEPAGE_VAR if desired.
    gethomepage.dev/enabled: "true"
    gethomepage.dev/name: "Grafana"
    gethomepage.dev/description: "Observability and visualization dashboards"
    gethomepage.dev/group: "Monitoring"
    gethomepage.dev/icon: "grafana.svg"
    gethomepage.dev/href: "https://grafana.lab.supermorphic.com"
    gethomepage.dev/pod-selector: "app.kubernetes.io/name=grafana"
spec:
  hostnames:
    - grafana.lab.supermorphic.com
  parentRefs:
    - group: gateway.networking.k8s.io
      kind: Gateway
      name: internal
      namespace: networking
      sectionName: https
  rules:
    - backendRefs:
        - group: ""
          kind: Service
          name: kube-prometheus-stack-grafana
          port: 80
          weight: 1
      matches:
        - path:
            type: PathPrefix
            value: /
---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: prometheus
  namespace: monitoring
  annotations:
    external-dns.k8s.io/audience: internal
    gethomepage.dev/enabled: "true"
    gethomepage.dev/name: "Prometheus"
    gethomepage.dev/description: "Metrics collection and queries"
    gethomepage.dev/group: "Monitoring"
    gethomepage.dev/icon: "prometheus.svg"
    gethomepage.dev/href: "https://prometheus.lab.supermorphic.com"
    gethomepage.dev/pod-selector: "app.kubernetes.io/name=prometheus"
    gethomepage.dev/widget.type: "prometheus"
    gethomepage.dev/widget.url: "http://kube-prometheus-stack-prometheus.monitoring.svc.cluster.local:9090"
spec:
  hostnames:
    - prometheus.lab.supermorphic.com
  parentRefs:
    - group: gateway.networking.k8s.io
      kind: Gateway
      name: internal
      namespace: networking
      sectionName: https
  rules:
    - backendRefs:
        - group: ""
          kind: Service
          name: kube-prometheus-stack-prometheus
          port: 9090
          weight: 1
      matches:
        - path:
            type: PathPrefix
            value: /
