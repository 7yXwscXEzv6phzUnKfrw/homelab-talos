# Gatus uptime dashboard. Endpoints probe the real user-facing HTTPS URLs behind
# the internal gateway (via Pi-hole DNS), so a green board proves the full path.
deployment:
  # Recreate (not RollingUpdate): the sqlite history is on a ReadWriteOnce Longhorn
  # PVC, so the old pod must release it before the new pod can mount it.
  strategy: Recreate
env:
  - name: TZ
    value: America/Denver
persistence:
  enabled: true
  storageClassName: longhorn
  size: 1Gi
  mountPath: /data
serviceMonitor:
  enabled: true
  interval: 1m
resources:
  requests:
    cpu: 25m
    memory: 32Mi
  limits:
    memory: 128Mi
ingress:
  enabled: false
gateway:
  enabled: false
config:
  storage:
    type: sqlite
    path: /data/data.db
  ui:
    title: "Homelab Status"
    header: "Homelab"
  endpoints:
    # Observability UIs (black-box, through the internal gateway).
    - name: grafana
      group: Observability
      url: "https://grafana.lab.supermorphic.com/api/health"
      interval: 1m
      conditions:
        - "[STATUS] == 200"
        - "[BODY].database == ok"
    - name: prometheus
      group: Observability
      url: "https://prometheus.lab.supermorphic.com/-/healthy"
      interval: 1m
      conditions:
        - "[STATUS] == 200"
    - name: alertmanager
      group: Observability
      url: "https://alertmanager.lab.supermorphic.com/-/healthy"
      interval: 1m
      conditions:
        - "[STATUS] == 200"
    # Platform edge: proves the Envoy gateway data path + wildcard TLS end to end.
    - name: echo
      group: Platform
      url: "https://echo.lab.supermorphic.com/"
      interval: 1m
      conditions:
        - "[STATUS] == 200"
    # Longhorn UI probed in-cluster so the unauthenticated admin UI is not exposed
    # to the LAN. Longhorn engine/replica/backup health lives in Prometheus.
    - name: longhorn-ui
      group: Storage
      url: "http://longhorn-frontend.longhorn-system.svc.cluster.local/"
      interval: 2m
      conditions:
        - "[STATUS] == 200"
    # External dependency cert-manager relies on for wildcard-cert renewal.
    - name: letsencrypt-acme
      group: External
      url: "https://acme-v02.api.letsencrypt.org/directory"
      interval: 10m
      conditions:
        - "[STATUS] == 200"
