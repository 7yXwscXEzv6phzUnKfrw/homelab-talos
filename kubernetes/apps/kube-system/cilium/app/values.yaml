---
cluster:
  id: 1
  name: nuc-cluster

ipam:
  mode: kubernetes

ipv4:
  enabled: true
ipv6:
  enabled: false

kubeProxyReplacement: true
k8sServiceHost: localhost
k8sServicePort: 7445

cgroup:
  autoMount:
    enabled: false
  hostRoot: /sys/fs/cgroup

securityContext:
  capabilities:
    ciliumAgent:
      - CHOWN
      - KILL
      - NET_ADMIN
      - NET_RAW
      - IPC_LOCK
      - SYS_ADMIN
      - SYS_RESOURCE
      - DAC_OVERRIDE
      - FOWNER
      - SETGID
      - SETUID
    cleanCiliumState:
      - NET_ADMIN
      - SYS_ADMIN
      - SYS_RESOURCE

routingMode: tunnel
tunnelProtocol: vxlan
bpf:
  masquerade: false

operator:
  replicas: 2
  rollOutPods: true

rollOutCiliumPods: true

hubble:
  enabled: true
  relay:
    enabled: true
  ui:
    enabled: false

envoy:
  enabled: false
gatewayAPI:
  enabled: false
l2announcements:
  enabled: false
bgpControlPlane:
  enabled: false

dashboards:
  enabled: false
prometheus:
  enabled: false
