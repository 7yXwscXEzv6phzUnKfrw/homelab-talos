---
# Intel GPU device plugin, vendored from the upstream standalone base at
# https://github.com/intel/intel-device-plugins-for-kubernetes (v0.36.0,
# deployments/gpu_plugin/base). Standalone DaemonSet — no operator, no CRDs, no
# cert-manager webhook. It advertises gpu.intel.com/i915 only on nodes that expose
# /dev/dri (all three NUCs via the siderolabs/i915 extension), so a pod requesting
# that resource is automatically scheduled onto a GPU-capable node. Lives in
# kube-system alongside cilium/metrics-server (hostPath needs a non-restricted ns).
apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: intel-gpu-plugin
  namespace: kube-system
  labels:
    app: intel-gpu-plugin
spec:
  selector:
    matchLabels:
      app: intel-gpu-plugin
  updateStrategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 0
      maxUnavailable: 1
  template:
    metadata:
      labels:
        app: intel-gpu-plugin
    spec:
      containers:
        - name: intel-gpu-plugin
          env:
            - name: NODE_NAME
              valueFrom:
                fieldRef:
                  fieldPath: spec.nodeName
            - name: HOST_IP
              valueFrom:
                fieldRef:
                  fieldPath: status.hostIP
          image: intel/intel-gpu-plugin:0.36.0
          imagePullPolicy: IfNotPresent
          securityContext:
            seLinuxOptions:
              type: "container_device_plugin_t"
            readOnlyRootFilesystem: true
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
            seccompProfile:
              type: RuntimeDefault
          resources:
            requests:
              memory: "45Mi"
              cpu: 40m
            limits:
              memory: "90Mi"
              cpu: 100m
          volumeMounts:
            - name: devfs
              mountPath: /dev/dri
              readOnly: true
            - name: sysfsdrm
              mountPath: /sys/class/drm
              readOnly: true
            - name: kubeletsockets
              mountPath: /var/lib/kubelet/device-plugins
            - name: cdipath
              mountPath: /var/run/cdi
      volumes:
        - name: devfs
          hostPath:
            path: /dev/dri
        - name: sysfsdrm
          hostPath:
            path: /sys/class/drm
        - name: kubeletsockets
          hostPath:
            path: /var/lib/kubelet/device-plugins
        - name: cdipath
          hostPath:
            path: /var/run/cdi
            type: DirectoryOrCreate
      nodeSelector:
        kubernetes.io/arch: amd64
