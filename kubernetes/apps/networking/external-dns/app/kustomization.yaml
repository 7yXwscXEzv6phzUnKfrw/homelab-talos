---
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources:
  - ./helmrelease.yaml
  - ./helmrepository.yaml
  - ./namespace.yaml
  - ./pihole-password.sops.yaml
configMapGenerator:
  - name: external-dns-internal-values
    namespace: external-dns
    files:
      - values.yaml=values.yaml
  - name: pihole-ca
    namespace: external-dns
    files:
      - tls_ca.crt=pihole-ca.crt
generatorOptions:
  disableNameSuffixHash: true
  labels:
    reconcile.fluxcd.io/watch: Enabled
