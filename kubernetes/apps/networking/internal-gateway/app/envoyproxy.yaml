---
apiVersion: gateway.envoyproxy.io/v1alpha1
kind: EnvoyProxy
metadata:
  name: internal
  namespace: networking
spec:
  provider:
    type: Kubernetes
    kubernetes:
      envoyDeployment:
        replicas: 2
        container:
          resources:
            requests:
              cpu: 50m
              memory: 128Mi
      envoyPDB:
        minAvailable: 1
      envoyService:
        annotations:
          metallb.io/address-pool: internal
          metallb.io/loadBalancerIPs: 192.168.90.40
        externalTrafficPolicy: Local
        type: LoadBalancer
